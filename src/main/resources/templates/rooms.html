<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Список аудиторій</title>
    <link th:href="@{style.css}" rel="stylesheet">
</head>
<body>

<div class="navbar">
    <div class="brand">Система бронювання</div>
    <a th:href="@{/}">Головна</a>
    <a th:href="@{/schedule}">Розклад та Бронювання</a>
    <a th:href="@{/rooms}">Список аудиторій</a>
    <a th:href="@{/teachers}">Викладачі</a>
    <a th:href="@{/login}" sec:authorize="!isAuthenticated()">Увійти</a>
    <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" style="margin: 0; padding-left: 10px;">
        <button type="submit">Вийти</button>
    </form>
</div>

<div class="container">
    <h2>Управління списком аудиторій</h2>

    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <div class="schedule-layout">

        <div class="form-section" sec:authorize="hasRole('ADMIN')">
            <h3>Додати аудиторію</h3>
            <form th:action="@{/rooms/add}" method="post">

                <div class="form-group">
                    <label for="number">Номер аудиторії:</label>
                    <input type="text" id="number" name="number" class="form-control" placeholder="" required>
                </div>

                <div class="form-group">
                    <label for="capacity">Місткість (місць):</label>
                    <input type="number" id="capacity" name="capacity" class="form-control" min="1" max="500" required>
                </div>

                <div class="form-group">
                    <label for="type">Тип приміщення:</label>
                    <select id="type" name="type" class="form-control" required>
                        <option value="Лекційна">Лекційна</option>
                        <option value="Комп'ютерний клас">Комп'ютерний клас</option>
                        <option value="Лабораторія">Лабораторія</option>
                        <option value="Семінарська">Семінарська</option>
                        <option value="Спортзал">Спортзал</option>
                    </select>
                </div>

                <button type="submit" class="btn">Зберегти</button>
            </form>
        </div>

        <div class="table-section">
            <h3>Список навчальних приміщень</h3>
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Номер</th>
                    <th>Місткість</th>
                    <th>Тип</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(rooms)}">
                    <td colspan="4">Немає жодної аудиторії. Додайте першу!</td>
                </tr>
                <tr th:each="room : ${rooms}">
                    <td th:text="${room.id}"></td>
                    <td th:text="${room.number}"></td>
                    <td th:text="${room.capacity} + ' місць'"></td>
                    <td th:text="${room.type}"></td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

</body>
</html>
